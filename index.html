<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Bao Space 💞</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020204;
            --glass-core: rgba(10, 10, 12, 0.45);
            --glass-plate: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bright: rgba(255, 255, 255, 0.16);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
            --neon-glow: rgba(138, 92, 246, 0.4);
            --neon-accent: #8a5cf6;
            --font-stack: 'Plus Jakarta Sans', sans-serif;
            --spring: linear(0, 0.009, 0.035 2.1%, 0.141, 0.281 6.7%, 0.723 12.9%, 0.938 16.7%, 1.017, 1.077, 1.121, 1.149 24.3%, 1.159, 1.163, 1.161, 1.154 29.9%, 1.129 32.8%, 1.051 39.6%, 1.017 43.1%, 0.991, 0.977 51%, 0.974 53.8%, 0.975 57.1%, 0.997 69.8%, 1.003 76.9%, 1.004 83.8%, 1);
            --bezier: cubic-bezier(0.15, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-stack);
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-base);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            perspective: 1200px;
        }

        #fluid-mesh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(138, 92, 246, 0.12) 0%, rgba(1, 1, 3, 0.85) 100%);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 1;
            transition: all 1.2s var(--bezier);
        }

        .island-matrix {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 12px;
            align-items: center;
            animation: slideFromTop 1s var(--spring) forwards;
        }

        .capsule-island {
            background: var(--glass-core);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: all 0.4s var(--bezier);
            cursor: pointer;
            overflow: hidden;
            min-width: 150px;
            height: 46px;
        }

        .capsule-island:hover {
            background: rgba(15, 15, 20, 0.6);
            border-color: var(--glass-bright);
        }

        .island-vector {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            color: var(--text-main);
        }

        .island-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .island-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            margin-top: 10px;
            background: rgba(8, 8, 12, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 6px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: all 0.35s var(--spring);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.7);
            transform-origin: top center;
        }

        .island-matrix.active .island-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .island-matrix.active .capsule-island {
            border-radius: 20px;
            background: rgba(20, 20, 28, 0.85);
        }

        .menu-row {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-row:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            transform: translateX(3px);
        }

        .menu-row::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.25s ease;
        }

        .menu-row:hover::before {
            background: var(--neon-accent);
            box-shadow: 0 0 8px var(--neon-glow);
        }

        .trigger-audio {
            background: var(--glass-core);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.35s var(--bezier);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            color: var(--text-main);
        }

        .trigger-audio:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.04);
            border-color: var(--glass-bright);
        }

        .trigger-audio.active-track {
            color: var(--neon-accent);
            border-color: var(--neon-glow);
            animation: audioPulse 1.8s infinite;
        }

        .workspace-stage {
            position: relative;
            z-index: 10;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1600px;
        }

        .magnetic-field {
            padding: 50px;
            display: inline-block;
        }

        .portal-card {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 44px 88px;
            border-radius: 36px;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15), inset 0 0 24px rgba(255,255,255,0.01);
            transform-style: preserve-3d;
            transition: transform 0.08s;
            animation: viewportEntrance 1.4s var(--spring) forwards;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 36px;
            background: linear-gradient(45deg, transparent, var(--neon-glow), transparent);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .portal-card:hover::before {
            opacity: 1;
        }

        .portal-title {
            font-size: 44px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            transform: translateZ(60px);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 14px;
            text-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        .portal-mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 36px;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.22), transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            mix-blend-mode: overlay;
        }

        .panel-dock-left {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            animation: slideFromLeft 1.2s var(--spring) forwards;
        }

        .panel-dock-bottom {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            animation: slideFromBottom 1.2s var(--spring) forwards;
        }

        .glass-dock {
            display: flex;
            background: var(--glass-core);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            padding: 10px;
        }

        .dock-vertical {
            flex-direction: column;
            gap: 12px;
            border-radius: 26px;
        }

        .dock-horizontal {
            flex-direction: row;
            align-items: flex-end;
            gap: 10px;
            border-radius: 28px;
        }

        .dock-node {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 15px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.4, 1);
            transform-origin: bottom center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
            color: #ffffff;
        }

        .dock-node svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: all 0.25s ease;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.4));
        }

        .dock-node.stroke-only svg {
            fill: none;
        }

        .dock-node .popup-tag {
            position: absolute;
            background: rgba(10, 10, 14, 0.92);
            color: #ffffff;
            padding: 5px 11px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.4px;
            border: 1px solid var(--glass-border);
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s var(--spring);
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .dock-horizontal .dock-node .popup-tag {
            top: -46px;
            transform: translateY(8px) scale(0.9);
        }

        .dock-vertical .dock-node .popup-tag {
            left: 68px;
            top: 50%;
            transform: translateY(-50%) translateX(-8px) scale(0.9);
        }

        .dock-node:hover .popup-tag {
            opacity: 1;
            visibility: visible;
        }

        .dock-horizontal .dock-node:hover .popup-tag {
            transform: translateY(0) scale(1);
        }

        .dock-vertical .dock-node:hover .popup-tag {
            transform: translateY(-50%) translateX(0) scale(1);
        }

        .dock-node::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            opacity: 0;
            transition: all 0.25s ease;
        }

        .dock-horizontal .dock-node::after {
            bottom: -5px;
        }

        .dock-vertical .dock-node::after {
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
        }

        .dock-node:hover::after {
            opacity: 1;
            background: var(--text-main);
            box-shadow: 0 0 8px #ffffff;
        }

        .split-bar {
            width: 1px;
            height: 36px;
            background: var(--glass-border);
            margin: 0 3px;
            align-self: center;
        }

        @keyframes slideFromTop {
            0% { opacity: 0; transform: translate(-50%, -35px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes slideFromBottom {
            0% { opacity: 0; transform: translate(-50%, 35px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes slideFromLeft {
            0% { opacity: 0; transform: translateY(-50%) translateX(-35px); }
            100% { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        @keyframes viewportEntrance {
            0% { opacity: 0; transform: scale(0.84) rotateX(8deg); }
            100% { opacity: 1; transform: scale(1) rotateX(0); }
        }

        @keyframes audioPulse {
            0%, 100% { box-shadow: 0 0 12px var(--neon-glow), inset 0 1px 0 rgba(255,255,255,0.08); }
            50% { box-shadow: 0 0 24px var(--neon-glow), inset 0 1px 0 rgba(255,255,255,0.16); }
        }

        @media (max-width: 900px) {
            body {
                overflow-y: auto;
            }

            .workspace-stage {
                padding-top: 100px;
                padding-bottom: 240px;
            }

            .portal-card {
                padding: 28px 50px;
            }

            .portal-title {
                font-size: 30px;
            }

            .panel-dock-bottom {
                width: 92%;
                max-width: 460px;
                bottom: 16px;
            }

            .panel-dock-bottom .glass-dock {
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 22px;
                padding: 10px;
                gap: 8px;
            }

            .panel-dock-left {
                top: auto;
                bottom: 140px;
                left: 50%;
                transform: translateX(-50%);
                width: auto;
                animation: slideFromBottom 1.2s var(--spring) forwards;
            }

            .panel-dock-left .glass-dock {
                flex-direction: row;
                border-radius: 22px;
                padding: 10px;
                gap: 8px;
            }

            .split-bar {
                display: none;
            }

            .dock-node {
                width: 46px;
                height: 46px;
            }

            .dock-node svg {
                width: 20px;
                height: 20px;
            }

            .island-matrix {
                width: 92%;
                justify-content: center;
            }

            .dock-vertical .dock-node .popup-tag,
            .dock-horizontal .dock-node .popup-tag {
                display: none !important;
            }
        }
    </style>
</head>

    <audio id="bgAudio" src="Hẹn Hò Nhưng Không Yêu (Thazh x Đông Remix).mp3" loop></audio>

    <script>
        'use strict';

        const dom = {
            body: document.body,
            overlay: document.getElementById('bgOverlay'),
            audio: document.getElementById('bgAudio'),
            audioBtn: document.getElementById('toggleMusic'),
            audioOff: document.getElementById('audio-off'),
            audioOn: document.getElementById('audio-on'),
            islandContainer: document.getElementById('islandContainer'),
            bgSelector: document.getElementById('bgSelector'),
            selectedText: document.getElementById('selectedText'),
            dropdownItems: document.querySelectorAll('.menu-row'),
            centerCard: document.getElementById('centerCard'),
            magneticArea: document.getElementById('magneticArea'),
            cardGlare: document.getElementById('cardGlare'),
            masterDock: document.getElementById('masterDock'),
            dockNodes: document.querySelectorAll('.panel-dock-bottom .dock-node'),
            canvas: document.getElementById('fluid-mesh')
        };

        let activeMusic = false;
        let activeDropdown = false;

        const updateStageBg = (imgUrl) => {
            if (imgUrl === 'bruh.jpg') {
                dom.overlay.style.backdropFilter = 'blur(14px)';
                dom.body.style.backgroundImage = 'none';
                return;
            }
            const instance = new Image();
            instance.src = imgUrl;
            instance.onload = () => {
                dom.overlay.style.backdropFilter = 'blur(32px)';
                dom.overlay.style.opacity = '0';
                setTimeout(() => {
                    dom.body.style.backgroundImage = `url('${imgUrl}')`;
                    dom.overlay.style.opacity = '1';
                    dom.overlay.style.backdropFilter = 'blur(8px)';
                }, 400);
            };
        };

        dom.audioBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (activeMusic) {
                dom.audio.pause();
                dom.audioOff.style.display = 'block';
                dom.audioOn.style.display = 'none';
                dom.audioBtn.classList.remove('active-track');
            } else {
                dom.audio.play().catch(err => console.warn(err));
                dom.audioOff.style.display = 'none';
                dom.audioOn.style.display = 'block';
                dom.audioBtn.classList.add('active-track');
            }
            activeMusic = !activeMusic;
        });

        dom.bgSelector.addEventListener('click', (e) => {
            e.stopPropagation();
            activeDropdown = !activeDropdown;
            dom.islandContainer.classList.toggle('active', activeDropdown);
        });

        dom.dropdownItems.forEach(row => {
            row.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetBg = row.getAttribute('data-bg');
                dom.selectedText.textContent = row.textContent;
                dom.selectedText.setAttribute('data-bg', targetBg);
                updateStageBg(targetBg);
                activeDropdown = false;
                dom.islandContainer.classList.remove('active');
            });
        });

        document.addEventListener('click', (e) => {
            if (activeDropdown && !dom.islandContainer.contains(e.target)) {
                activeDropdown = false;
                dom.islandContainer.classList.remove('active');
            }
        });

        const initialBg = dom.selectedText.getAttribute('data-bg');
        if (initialBg) updateStageBg(initialBg);

        dom.magneticArea.addEventListener('mousemove', (e) => {
            const boundary = dom.centerCard.getBoundingClientRect();
            const coordX = e.clientX - boundary.left - boundary.width / 2;
            const coordY = e.clientY - boundary.top - boundary.height / 2;
            
            const dampener = 0.08;
            const pitch = -coordY * dampener;
            const yaw = coordX * dampener;

            dom.centerCard.style.transform = `scale(1.04) rotateX(${pitch}deg) rotateY(${yaw}deg)`;
            
            const positionX = (e.clientX - boundary.left) / boundary.width * 100;
            const positionY = (e.clientY - boundary.top) / boundary.height * 100;
            dom.cardGlare.style.background = `radial-gradient(circle at ${positionX}% ${positionY}%, rgba(255,255,255,0.25), transparent 65%)`;
            dom.cardGlare.style.opacity = '1';
        });

        dom.magneticArea.addEventListener('mouseleave', () => {
            dom.centerCard.style.transform = `scale(1) rotateX(0deg) rotateY(0deg)`;
            dom.cardGlare.style.opacity = '0';
        });

        dom.masterDock.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 900) return;
            dom.dockNodes.forEach(node => {
                const boundary = node.getBoundingClientRect();
                const centerPoint = boundary.left + boundary.width / 2;
                const distanceVector = Math.abs(e.clientX - centerPoint);
                
                const scope = 160;
                const lowScale = 1;
                const highScale = 1.35;
                
                let dynamicScale = lowScale;
                let offsetElevation = 0;

                if (distanceVector < scope) {
                    const ratio = 1 - (distanceVector / scope);
                    dynamicScale = lowScale + (highScale - lowScale) * Math.pow(ratio, 2);
                    offsetElevation = 14 * Math.pow(ratio, 2);
                }

                node.style.transform = `scale(${dynamicScale}) translateY(-${offsetElevation}px)`;
                node.style.zIndex = Math.round(dynamicScale * 12);
            });
        });

        dom.masterDock.addEventListener('mouseleave', () => {
            dom.dockNodes.forEach(node => {
                node.style.transform = `scale(1) translateY(0)`;
                node.style.zIndex = 1;
            });
        });

        const surface = dom.canvas.getContext('2d');
        let viewW, viewH, matrixArray = [];

        const syncCanvasBounds = () => {
            viewW = dom.canvas.width = window.innerWidth;
            viewH = dom.canvas.height = window.innerHeight;
        };

        class FluidNode {
            constructor() {
                this.x = Math.random() * viewW;
                this.y = Math.random() * viewH;
                this.mx = (Math.random() - 0.5) * 0.4;
                this.my = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 2 + 0.6;
                this.alphaDensity = Math.random() * 0.4 + 0.15;
            }

            advance() {
                this.x += this.mx;
                this.y += this.my;

                if (this.x < 0) this.x = viewW;
                if (this.x > viewW) this.x = 0;
                if (this.y < 0) this.y = viewH;
                if (this.y > viewH) this.y = 0;
            }

            render() {
                surface.beginPath();
                surface.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                surface.fillStyle = `rgba(138, 92, 246, ${this.alphaDensity})`;
                surface.fill();
            }
        }

        const compileMatrix = () => {
            matrixArray = [];
            const allocation = Math.min(window.innerWidth / 12, 90);
            for (let i = 0; i < allocation; i++) {
                matrixArray.push(new FluidNode());
            }
        };

        const renderLoop = () => {
            surface.clearRect(0, 0, viewW, viewH);
            
            for (let i = 0; i < matrixArray.length; i++) {
                matrixArray[i].advance();
                matrixArray[i].render();
                
                for (let j = i + 1; j < matrixArray.length; j++) {
                    const vectorX = matrixArray[i].x - matrixArray[j].x;
                    const vectorY = matrixArray[i].y - matrixArray[j].y;
                    const totalSpace = Math.sqrt(vectorX * vectorX + vectorY * vectorY);
                    
                    if (totalSpace < 130) {
                        surface.beginPath();
                        surface.moveTo(matrixArray[i].x, matrixArray[i].y);
                        surface.lineTo(matrixArray[j].x, matrixArray[j].y);
                        surface.strokeStyle = `rgba(138, 92, 246, ${0.12 * (1 - totalSpace / 130)})`;
                        surface.lineWidth = 0.6;
                        surface.stroke();
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        };

        window.addEventListener('resize', () => {
            syncCanvasBounds();
            compileMatrix();
        });

        syncCanvasBounds();
        compileMatrix();
        renderLoop();
    </script>
