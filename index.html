<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Bao Space 💞</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-accent: rgba(255, 255, 255, 0.4);
            --text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.3) 100%);
            z-index: -1;
        }

        .button1 {
            position: relative;
            font-weight: 600;
            color: #fff;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-decoration: none;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            font-size: clamp(20px, 5vw, 32px);
            padding: 60px 100px;
            border-radius: 30px;
            transition: var(--transition);
            text-shadow: var(--text-shadow);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.1);
            z-index: 5;
            text-align: center;
        }

        .button1:hover {
            transform: scale(1.1) translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 30px rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }

        .side-menu {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .menu-item {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            font-size: 22px;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .menu-item img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px white);
        }

        .menu-item:hover {
            transform: scale(1.2) translateX(10px);
            background: var(--glass-accent);
            border-color: #fff;
        }

        .glass-navbar {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .nav-item {
            padding: 8px;
            border-radius: 12px;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }

        .nav-item img {
            width: 22px;
            height: 22px;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--glass-accent);
            transform: translateY(-3px);
        }

        .custom-dropdown-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .dropdown-header {
            padding: 12px 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            min-width: 160px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .dropdown-header:hover {
            background: var(--glass-accent);
        }

        .dropdown-list {
            position: absolute;
            bottom: calc(100% + 15px);
            right: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            list-style: none;
            overflow: hidden;
            display: none;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-list.show { display: block; }

        .dropdown-list li {
            padding: 12px;
            color: #fff;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dropdown-list li:hover {
            background: var(--glass-accent);
            padding-left: 20px;
        }

        @media (max-width: 768px) {
            .side-menu {
                left: 15px;
                gap: 15px;
            }
            .glass-navbar {
                top: 15px;
                right: 15px;
                padding: 5px 10px;
            }
            .button1 {
                padding: 40px 60px;
            }
            .custom-dropdown-container {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <a href="https://guns.lol/vdgb_" target="_blank" class="button1">
        Gia Bao Space 💞
    </a>

    <div class="side-menu">
        <a href="https://locket.cam/vdgb1805" class="menu-item" title="Locket">
            <img src="heart.png" alt="heart">
        </a>
        <a href="#" class="menu-item" id="toggleMusic">
            🔇
        </a>
        <a href="https://vdgb123.github.io/vdgbsupport.github.io/" class="menu-item" title="Support">
            <img src="star.png" alt="star">
        </a>
        <a href="https://vdgb123.github.io/loading/" class="menu-item" title="Loading">
            <img src="mb4.png" alt="mb4">
        </a>
    </div>

    <nav class="glass-navbar">
        <a href="https://github.com/vDgb123" class="nav-item"><img src="github.png" alt="github"></a>
        <a href="https://www.tiktok.com/@dgbinhere" class="nav-item"><img src="tiktok.png" alt="tiktok"></a>
        <a href="https://discord.com/users/1044501093486436404" class="nav-item"><img src="dc.png" alt="discord"></a>
        <a href="https://open.spotify.com/playlist/37i9dQZF1E4pcdtow1yIdx?si=99xxZZKcQhyyftf43OemMg" class="nav-item"><img src="spotify.png" alt="spotify"></a>
        <a href="https://www.facebook.com/dogobo1805/" class="nav-item"><img src="fb.png" alt="facebook"></a>
    </nav>

    <div class="custom-dropdown-container">
        <div class="dropdown-header" onclick="toggleDropdown()">
            <span id="selected-text" data-bg="bruh.jpg">None</span>
        </div>
        <ul class="dropdown-list" id="dropdown-options">
            <li data-bg="volvo.jpg">Volvo</li>
            <li data-bg="mercedes.jpg">Mercedes</li>
            <li data-bg="audi.jpg">Audi</li>
            <li data-bg="bruh.jpg">None</li>
        </ul>
    </div>

    <audio id="myAudio" src="Hẹn Hò Nhưng Không Yêu (Thazh x Đông Remix).mp3" loop></audio>

    <script>
        const audio = document.getElementById('myAudio');
        const musicBtn = document.getElementById('toggleMusic');
        const list = document.getElementById('dropdown-options');
        const selectedText = document.getElementById('selected-text');
        let isPlaying = false;

        function setBackground(url) {
            document.body.style.backgroundImage = `url('${url}')`;
        }

        musicBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isPlaying) {
                audio.pause();
                musicBtn.textContent = '🔇';
            } else {
                audio.play();
                musicBtn.textContent = '🔊';
            }
            isPlaying = !isPlaying;
        });

        function toggleDropdown() {
            list.classList.toggle('show');
        }

        list.querySelectorAll('li').forEach(item => {
            item.addEventListener('click', function() {
                const bg = this.getAttribute('data-bg');
                selectedText.textContent = this.textContent;
                setBackground(bg);
                list.classList.remove('show');
            });
        });

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown-container')) {
                list.classList.remove('show');
            }
        });

        setBackground(selectedText.getAttribute('data-bg'));
    </script>
</body>
</html>
