<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Bao Space 💞</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.2); /* Frosted glass white */
            --glass-solid: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-hover: rgba(255, 255, 255, 0.5);
            --text-glow: 0 0 10px rgba(255, 255, 255, 0.4);
            --box-glow: 0 0 30px rgba(255, 255, 255, 0.2);
            --transition-smooth: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505; /* Base still dark for image pop */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: var(--font-main);
            overflow: hidden;
            color: #000000; /* Default text dark */
        }

        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.6) 100%);
            backdrop-filter: blur(8px);
            z-index: 1;
            transition: backdrop-filter 0.8s ease;
        }

        .main-content {
            position: relative;
            z-index: 10;
            animation: popIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .button1 {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            /* Update to Light Glassmorphism */
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--glass-border);
            font-size: clamp(24px, 6vw, 42px);
            padding: clamp(40px, 8vw, 70px) clamp(60px, 12vw, 120px);
            border-radius: 40px;
            letter-spacing: 1px;
            transition: var(--transition-bounce);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }

        .button1::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            transition: 0.7s ease;
        }

        .button1:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--glass-hover);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), var(--box-glow), inset 0 1px 0 rgba(255,255,255,0.6);
            text-shadow: var(--text-glow);
            letter-spacing: 3px;
        }

        .button1:hover::before {
            left: 200%;
        }

        .button1:active {
            transform: scale(0.98);
        }

        .glass-dock {
            position: fixed;
            /* Update to Light Glassmorphism */
            background: var(--glass-solid);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .dock-vertical {
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            flex-direction: column;
            padding: 20px 15px;
            border-radius: 40px;
            gap: 25px;
        }

        .dock-horizontal {
            top: 40px;
            right: 40px;
            flex-direction: row;
            padding: 15px 25px;
            border-radius: 40px;
            gap: 20px; /* Space between top nav icons */
        }

        .dock-item {
            position: relative;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: transparent;
            border-radius: 50%;
            transition: var(--transition-bounce);
            /* Side Nav Icons will need darker coloring for light glass, handled in SVG/Image */
            font-size: 24px;
        }

        .dock-item img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            transition: var(--transition-bounce);
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        .dock-item::after {
            content: attr(data-tooltip);
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
            white-space: nowrap;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .dock-vertical .dock-item::after {
            left: calc(100% + 20px);
            transform: translateX(-10px);
        }

        .dock-horizontal .dock-item::after {
            top: calc(100% + 20px);
            transform: translateY(-10px);
        }

        .dock-item:hover {
            background: var(--glass-hover);
            transform: scale(1.15);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .dock-item:hover img {
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .dock-item:hover::after {
            opacity: 1;
            transform: translate(0);
        }

        .custom-dropdown-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .dropdown-header {
            padding: 16px 30px;
            /* Update to Light Glassmorphism */
            background: var(--glass-solid);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: #000000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-bounce);
            min-width: 180px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .dropdown-header::after {
            content: '';
            width: 10px;
            height: 10px;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            transform: rotate(45deg);
            transition: var(--transition-smooth);
        }

        .custom-dropdown-container.active .dropdown-header {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }

        .custom-dropdown-container.active .dropdown-header::after {
            transform: rotate(-135deg);
        }

        .dropdown-list {
            position: absolute;
            bottom: calc(100% + 15px);
            right: 0;
            width: 100%;
            /* Update to Light Glassmorphism */
            background: var(--glass-solid);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            list-style: none;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: var(--transition-smooth);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .custom-dropdown-container.active .dropdown-list {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-list li {
            padding: 15px 25px;
            color: rgba(0,0,0,0.7);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-smooth);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .dropdown-list li:last-child {
            border-bottom: none;
        }

        .dropdown-list li:hover {
            color: #000000;
            background: var(--glass-hover);
            padding-left: 30px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(-50%) translateX(-50px); }
            100% { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            .dock-horizontal { top: 20px; right: 20px; padding: 10px 15px; gap: 10px; }
            .dock-vertical { left: 20px; }
            .dock-item { width: 45px; height: 45px; }
        }

        @media (max-width: 768px) {
            .bg-overlay { backdrop-filter: blur(12px); }
            
            .dock-vertical {
                left: 50%;
                top: auto;
                bottom: 30px;
                transform: translateX(-50%);
                flex-direction: row;
                width: calc(100% - 40px);
                max-width: 400px;
                justify-content: space-evenly;
                padding: 15px 10px;
                animation: mobileSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }

            .dock-horizontal {
                top: 20px;
                right: 50%;
                transform: translateX(50%);
                width: max-content;
                padding: 10px 20px;
                animation: mobileSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }

            .custom-dropdown-container {
                bottom: 110px;
                right: 50%;
                transform: translateX(50%);
                animation: fadeIn 1s ease forwards;
            }

            .dropdown-list {
                bottom: auto;
                top: calc(100% + 15px);
            }

            .dock-item::after { display: none; }
        }

        @keyframes mobileSlideUp {
            0% { opacity: 0; transform: translate(-50%, 50px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes mobileSlideDown {
            0% { opacity: 0; transform: translate(50%, -50px); }
            100% { opacity: 1; transform: translate(50%, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-dock dock-vertical">
        <a href="https://locket.cam/vdgb1805" class="dock-item" data-tooltip="Locket">
            <img src="heart.png" alt="heart" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iYmxhY2siPjxwb2x5Z29uIHBvaW50cz0iMTIgMiA0IDIyIDIwIDIyIi8+PC9zdmc+'">

            <img src="star.png" alt="star" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iYmxhY2siPjxwb2x5Z29uIHBvaW50cz0iMTIgMiA0IDIyIDIwIDIyIi8+PC9zdmc+'">

    <div class="main-content">
        <a href="https://guns.lol/vdgb_" target="_blank" class="button1">
            Gia Bao Space 💞
        </a>

    <div class="custom-dropdown-container" id="dropdownContainer">
        <div class="dropdown-header" id="dropdownHeader">
            <span id="selectedText" data-bg="bruh.jpg">None</span>
        </div>
        <ul class="dropdown-list" id="dropdownList">
            <li data-bg="volvo.jpg">Volvo</li>
            <li data-bg="mercedes.jpg">Mercedes</li>
            <li data-bg="audi.jpg">Audi</li>
            <li data-bg="bruh.jpg">None</li>
        </ul>
    </div>

    <audio id="bgAudio" src="Hẹn Hò Nhưng Không Yêu (Thazh x Đông Remix).mp3" loop></audio>

    <script>
        const bodyElement = document.body;
        const overlay = document.getElementById('bgOverlay');
        const audioNode = document.getElementById('bgAudio');
        const audioBtn = document.getElementById('toggleMusic');
        const dropdownWrap = document.getElementById('dropdownContainer');
        const dropdownHead = document.getElementById('dropdownHeader');
        const dropdownItems = document.querySelectorAll('#dropdownList li');
        const activeText = document.getElementById('selectedText');

        let musicPlaying = false;

        const executeBgChange = (imgUrl) => {
            const tempImg = new Image();
            tempImg.src = imgUrl;
            tempImg.onload = () => {
                overlay.style.backdropFilter = 'blur(20px)';
                setTimeout(() => {
                    bodyElement.style.backgroundImage = `url('${imgUrl}')`;
                    overlay.style.backdropFilter = 'blur(8px)';
                }, 400);
            };
        };

        audioBtn.addEventListener('click', (ev) => {
            ev.preventDefault();
            if (musicPlaying) {
                audioNode.pause();
                // Emojis default to browser/OS style, may need styling if they are too light
                audioBtn.textContent = '🔇';
                audioBtn.setAttribute('data-tooltip', 'Play Audio');
            } else {
                audioNode.play().catch(e => console.warn("Autoplay blocked:", e));
                audioBtn.textContent = '🔊';
                audioBtn.setAttribute('data-tooltip', 'Pause Audio');
            }
            musicPlaying = !musicPlaying;
        });

        dropdownHead.addEventListener('click', (ev) => {
            ev.stopPropagation();
            dropdownWrap.classList.toggle('active');
        });

        dropdownItems.forEach(node => {
            node.addEventListener('click', (ev) => {
                ev.stopPropagation();
                const targetBg = node.getAttribute('data-bg');
                activeText.textContent = node.textContent;
                activeText.setAttribute('data-bg', targetBg);
                executeBgChange(targetBg);
                dropdownWrap.classList.remove('active');
            });
        });

        document.addEventListener('click', (ev) => {
            if (!dropdownWrap.contains(ev.target)) {
                dropdownWrap.classList.remove('active');
            }
        });

        const initBg = activeText.getAttribute('data-bg');
        if (initBg) executeBgChange(initBg);
    </script>
</body>
</html>
